apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "golang-api.fullname" . }}
  labels:
    {{- include "golang-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "golang-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "golang-api.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: golang-api
          image: hashicorp/http-echo
          args:
            - "-text=Hello from Golang API on Main Cluster"
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
