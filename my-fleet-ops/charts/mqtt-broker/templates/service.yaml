apiVersion: v1
kind: Service
metadata:
  name: {{ include "mqtt-broker.fullname" . }}
  labels:
    {{- include "mqtt-broker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 1883
      protocol: TCP
      name: mqtt
  selector:
    {{- include "mqtt-broker.selectorLabels" . | nindent 4 }}
