apiVersion: v1
kind: Service
metadata:
  name: {{ include "internal-registry.fullname" . }}
  labels:
    {{- include "internal-registry.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5000
      protocol: TCP
      name: registry
  selector:
    {{- include "internal-registry.selectorLabels" . | nindent 4 }}
