apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: main-apps
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  type: main
              values:
                clusterName: '{{name}}'
          - list:
              elements:
                - appPath: my-fleet-ops/charts/golang-api
                  appName: golang-api
                - appPath: my-fleet-ops/charts/mqtt-broker
                  appName: mqtt-broker
                - appPath: my-fleet-ops/charts/internal-registry
                  appName: internal-registry
  template:
    metadata:
      name: '{{values.clusterName}}-{{appName}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/rampxxxx/collector.git
        targetRevision: HEAD
        path: '{{appPath}}'
        helm:
          valueFiles:
            - ../../apps-config/main-values.yaml
      destination:
        server: '{{server}}'
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
